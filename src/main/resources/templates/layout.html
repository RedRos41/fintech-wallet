<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Fintech Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-navbar">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-wallet2 me-2"></i>Fintech Wallet
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/users}">
                        <i class="bi bi-people me-1"></i>Usuarios
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/wallets}">
                        <i class="bi bi-wallet me-1"></i>Billeteras
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transactions}">
                        <i class="bi bi-arrow-left-right me-1"></i>Transacciones
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/scheduled}">
                        <i class="bi bi-clock-history me-1"></i>Programadas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/rewards}">
                        <i class="bi bi-gift me-1"></i>Recompensas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/analytics}">
                        <i class="bi bi-graph-up me-1"></i>Analitica
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/notifications}">
                        <i class="bi bi-bell me-1"></i>Notificaciones
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Flash messages -->
<div class="container mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- Main content -->
<main class="container my-4 flex-grow-1">
    <section layout:fragment="content"></section>
</main>

<!-- Footer -->
<footer class="footer mt-auto py-3 bg-dark text-light text-center">
    <div class="container">
        <span class="text-muted">
            Universidad del Quindio &mdash; Estructuras de Datos 2026-1 | Derek, Brahian, Sara
        </span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
