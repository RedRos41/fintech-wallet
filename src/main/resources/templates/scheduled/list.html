<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="es">
<head>
    <title>Operaciones Programadas - Fintech Wallet</title>
</head>
<body>
<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clock-history me-2"></i>Operaciones Programadas</h2>
        <div>
            <form th:action="@{/scheduled/process}" method="post" class="d-inline">
                <button type="submit" class="btn btn-warning me-2">
                    <i class="bi bi-play-circle me-1"></i>Ejecutar Operaciones Vencidas
                </button>
            </form>
            <a th:href="@{/scheduled/new}" class="btn btn-accent">
                <i class="bi bi-plus-circle me-1"></i>Nueva Operacion Programada
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha Programada</th>
                        <th>Tipo</th>
                        <th>Monto</th>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Descripcion</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="op : ${operations}">
                        <td><code th:text="${#strings.abbreviate(op.id, 12)}"></code></td>
                        <td th:text="${#temporals.format(op.scheduledDate, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${op.type}"></td>
                        <td th:text="'$ ' + ${#numbers.formatDecimal(op.amount, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td><code th:text="${#strings.abbreviate(op.sourceWalletCode, 12)}"></code></td>
                        <td>
                            <code th:if="${op.targetWalletCode != null and !op.targetWalletCode.isEmpty()}"
                                  th:text="${#strings.abbreviate(op.targetWalletCode, 12)}"></code>
                            <span th:if="${op.targetWalletCode == null or op.targetWalletCode.isEmpty()}"
                                  class="text-muted">-</span>
                        </td>
                        <td th:text="${op.description}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${op.executed ? 'bg-success' : 'bg-warning text-dark'}"
                                  th:text="${op.executed ? 'Ejecutada' : 'Pendiente'}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(operations)}">
                        <td colspan="8" class="text-center text-muted py-3">No hay operaciones programadas</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
