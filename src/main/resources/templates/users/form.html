<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="es">
<head>
    <title>Formulario Usuario - Fintech Wallet</title>
</head>
<body>
<section layout:fragment="content">

    <h2 class="mb-4">
        <i class="bi bi-person-plus me-2" th:if="${user == null}"></i>
        <i class="bi bi-person-gear me-2" th:if="${user != null}"></i>
        <span th:if="${user == null}">Nuevo Usuario</span>
        <span th:if="${user != null}">Editar Usuario</span>
    </h2>

    <div class="card" style="max-width: 600px;">
        <div class="card-body">
            <!-- Create form -->
            <form th:if="${user == null}" th:action="@{/users/create}" method="post">
                <div class="mb-3">
                    <label for="id-create" class="form-label">Cedula</label>
                    <input type="text" class="form-control" id="id-create" name="id" required
                           placeholder="Ingrese la cedula"/>
                </div>
                <div class="mb-3">
                    <label for="name-create" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="name-create" name="name" required
                           placeholder="Nombre completo"/>
                </div>
                <div class="mb-3">
                    <label for="email-create" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email-create" name="email" required
                           placeholder="correo@ejemplo.com"/>
                </div>
                <div class="mb-3">
                    <label for="phone-create" class="form-label">Telefono</label>
                    <input type="text" class="form-control" id="phone-create" name="phone" required
                           placeholder="Numero de telefono"/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accent">
                        <i class="bi bi-check-circle me-1"></i>Crear Usuario
                    </button>
                    <a th:href="@{/users}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>

            <!-- Edit form -->
            <form th:if="${user != null}" th:action="@{/users/{id}/update(id=${user.id})}" method="post">
                <div class="mb-3">
                    <label for="id-edit" class="form-label">Cedula</label>
                    <input type="text" class="form-control" id="id-edit" name="id"
                           th:value="${user.id}" readonly/>
                </div>
                <div class="mb-3">
                    <label for="name-edit" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="name-edit" name="name"
                           th:value="${user.name}" required/>
                </div>
                <div class="mb-3">
                    <label for="email-edit" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email-edit" name="email"
                           th:value="${user.email}" required/>
                </div>
                <div class="mb-3">
                    <label for="phone-edit" class="form-label">Telefono</label>
                    <input type="text" class="form-control" id="phone-edit" name="phone"
                           th:value="${user.phone}" required/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accent">
                        <i class="bi bi-check-circle me-1"></i>Actualizar Usuario
                    </button>
                    <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</section>
</body>
</html>
