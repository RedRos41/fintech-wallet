<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="es">
<head>
    <title>Detalle Billetera - Fintech Wallet</title>
</head>
<body>
<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-wallet me-2"></i>Detalle de Billetera</h2>
        <a th:href="@{/wallets}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Volver a Billeteras
        </a>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">Informacion de la Billetera</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <dl class="row mb-0">
                        <dt class="col-sm-4">Codigo</dt>
                        <dd class="col-sm-8"><code th:text="${wallet.code}"></code></dd>
                        <dt class="col-sm-4">Nombre</dt>
                        <dd class="col-sm-8" th:text="${wallet.name}"></dd>
                        <dt class="col-sm-4">Tipo</dt>
                        <dd class="col-sm-8" th:text="${wallet.type}"></dd>
                    </dl>
                </div>
                <div class="col-md-6">
                    <dl class="row mb-0">
                        <dt class="col-sm-4">Saldo</dt>
                        <dd class="col-sm-8 fw-bold text-success"
                            th:text="'$ ' + ${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 2, 'POINT')}"></dd>
                        <dt class="col-sm-4">Estado</dt>
                        <dd class="col-sm-8">
                            <span class="badge"
                                  th:classappend="${wallet.active ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${wallet.active ? 'Activa' : 'Inactiva'}"></span>
                        </dd>
                        <dt class="col-sm-4">Propietario</dt>
                        <dd class="col-sm-8">
                            <a th:href="@{/users/{id}(id=${wallet.ownerId})}"
                               th:text="${wallet.ownerId}"></a>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-clock-history me-1"></i>Historial de Transacciones</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Monto</th>
                        <th>Estado</th>
                        <th>Descripcion</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.date, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${tx.type}"></td>
                        <td th:text="'$ ' + ${#numbers.formatDecimal(tx.amount, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${tx.status.name() == 'COMPLETED' ? 'bg-success' :
                                                    tx.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                                    tx.status.name() == 'REVERSED' ? 'bg-info' :
                                                    'bg-danger'}"
                                  th:text="${tx.status}"></span>
                        </td>
                        <td th:text="${tx.description}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(transactions)}">
                        <td colspan="5" class="text-center text-muted py-3">No hay transacciones registradas</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
