<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="es">
<head>
    <title>Billeteras - Fintech Wallet</title>
</head>
<body>
<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-wallet me-2"></i>Billeteras</h2>
        <a th:href="@{/wallets/new}" class="btn btn-accent">
            <i class="bi bi-plus-circle me-1"></i>Nueva Billetera
        </a>
    </div>

    <div th:if="${#maps.isEmpty(walletsByUser)}" class="alert alert-info">
        <i class="bi bi-info-circle me-1"></i>No hay billeteras registradas en el sistema.
    </div>

    <div th:each="entry : ${walletsByUser}" class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">
                <i class="bi bi-person me-1"></i>
                <span th:text="${entry.key.name}"></span>
                <small class="text-muted" th:text="'(' + ${entry.key.id} + ')'"></small>
            </h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                    <tr>
                        <th>Codigo</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Saldo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="wallet : ${entry.value}">
                        <td><code th:text="${#strings.abbreviate(wallet.code, 12)}"></code></td>
                        <td th:text="${wallet.name}"></td>
                        <td th:text="${wallet.type}"></td>
                        <td th:text="'$ ' + ${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${wallet.active ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${wallet.active ? 'Activa' : 'Inactiva'}"></span>
                        </td>
                        <td>
                            <a th:href="@{/wallets/{code}(code=${wallet.code})}"
                               class="btn btn-sm btn-outline-primary" title="Ver detalle">
                                <i class="bi bi-eye me-1"></i>Ver detalle
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(entry.value)}">
                        <td colspan="6" class="text-center text-muted py-3">Este usuario no tiene billeteras</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
